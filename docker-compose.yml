  # ── MongoDB Database (New) ────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: smart_fence_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

