; ============================================================
; Smart Virtual Fence System — PlatformIO Configuration
; Target: ESP32-S3 (Espressif)
; ============================================================

[env:esp32-s3-devkitc-1]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; Build flags
build_flags =
    -std=c++11
    -DCORE_DEBUG_LEVEL=3

; Libraries
lib_deps =
    mikalhart/TinyGPSPlus @ ^1.0.3
    bblanchon/ArduinoJson @ ^7.0.4
    knolleary/PubSubClient @ ^2.8.0

; Upload & Serial
upload_speed   = 921600
monitor_speed  = 115200
monitor_port   = AUTO

[env:esp32-s3-devkitc-1-release]
extends    = env:esp32-s3-devkitc-1
build_flags =
    -std=c++11
    -DNDEBUG
    -O2
